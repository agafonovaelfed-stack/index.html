<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Программист - Код Мастер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', 'Courier New', monospace;
            transition: background 0.5s ease;
        }

        /* Фоны */
        body.bg-default {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        body.bg-desert {
            background: linear-gradient(135deg, #c94b4b, #4b1e1e);
            background-image: url('https://images.pexels.com/photos/2387873/pexels-photo-2387873.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2');
            background-size: cover;
            background-position: center;
        }
        body.bg-classroom {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            background-image: url('https://images.pexels.com/photos/256468/pexels-photo-256468.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2');
            background-size: cover;
            background-position: center;
        }
        body.bg-space {
            background: linear-gradient(135deg, #0a0f2a, #0f0f2a);
            background-image: url('https://images.pexels.com/photos/998641/pexels-photo-998641.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2');
            background-size: cover;
            background-position: center;
        }
        body.bg-cyber {
            background: linear-gradient(135deg, #0a0f1a, #0a2a2a);
            background-image: url('https://images.pexels.com/photos/2582937/pexels-photo-2582937.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2');
            background-size: cover;
            background-position: center;
        }

        .game-container {
            min-height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(3px);
            padding: 20px;
        }

        .game {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(10, 10, 20, 0.9);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Аутентификация */
        .auth-screen {
            text-align: center;
            padding: 20px;
        }
        .auth-screen h2 {
            color: #2ecc71;
            margin-bottom: 20px;
        }
        .auth-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 12px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
        }
        .auth-btn {
            background: #2ecc71;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            margin: 10px;
            cursor: pointer;
        }
        .tg-link {
            background: #0088cc;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            text-decoration: none;
            margin: 15px 0;
        }

        /* Основной геймплей */
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
        }
        .coins, .level {
            font-size: 20px;
            font-weight: bold;
        }
        .character-area {
            text-align: center;
            padding: 20px;
        }
        .character {
            font-size: 80px;
            transition: 0.1s;
        }
        .character.typing {
            animation: shake 0.1s infinite;
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(2px); }
            75% { transform: translateX(-2px); }
            100% { transform: translateX(0); }
        }
        .code-btn {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            width: 100%;
            padding: 18px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            margin: 15px 0;
        }
        .code-log {
            background: rgba(0,0,0,0.6);
            border-radius: 16px;
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            font-size: 12px;
        }
        .shop-btn {
            background: #f39c12;
            padding: 10px;
            border-radius: 30px;
            text-align: center;
            margin-top: 10px;
            cursor: pointer;
        }
        .shop-panel {
            display: none;
            margin-top: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.6);
            border-radius: 16px;
        }
        .shop-item {
            display: inline-block;
            width: 45%;
            margin: 5px;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
        }
        .logout-btn {
            background: #e74c3c;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-default">
<div class="game-container" id="app">
    <!-- Экран регистрации/входа -->
    <div id="authScreen" class="game">
        <div class="auth-screen">
            <h2>🐍 КОД МАСТЕР</h2>
            <p>Подпишись на Telegram канал:</p>
            <a href="https://t.me/hioly3" target="_blank" class="tg-link">📱 @hioly3</a>
            <input type="text" id="regUsername" class="auth-input" placeholder="Придумайте никнейм">
            <input type="text" id="regLogin" class="auth-input" placeholder="Логин">
            <input type="password" id="regPassword" class="auth-input" placeholder="Пароль">
            <button class="auth-btn" onclick="register()">🔓 Регистрация</button>
            <p style="margin-top: 15px;">Уже есть аккаунт?</p>
            <input type="text" id="loginLogin" class="auth-input" placeholder="Логин">
            <input type="password" id="loginPassword" class="auth-input" placeholder="Пароль">
            <button class="auth-btn" onclick="login()">🔑 Вход</button>
        </div>
    </div>

    <!-- Основная игра (скрыта до авторизации) -->
    <div id="gameScreen" style="display: none;">
        <div class="game">
            <div class="stats">
                <div class="coins">💰 <span id="coinAmount">0</span></div>
                <div class="level">👤 <span id="nicknameDisplay"></span></div>
                <div class="logout-btn" onclick="logout()">🚪 Выйти</div>
            </div>
            <div class="character-area">
                <div class="character" id="gameCharacter">🧑‍💻</div>
                <div class="keyboard" style="background:#111; padding:8px; border-radius:12px;">⌨️ Ctrl + R / Кнопка</div>
            </div>
            <button class="code-btn" id="codeGameBtn" onclick="doCode()">💻 КОДИТЬ 💻</button>
            <div class="shop-btn" onclick="toggleShop()">🛒 Магазин фонов (50 монет)</div>
            <div id="shopPanel" class="shop-panel">
                <div class="shop-item" onclick="buyBackground('bg-default', 'Стандарт')">🌙 Стандарт</div>
                <div class="shop-item" onclick="buyBackground('bg-desert', 'Пустыня')">🏜️ Пустыня</div>
                <div class="shop-item" onclick="buyBackground('bg-classroom', 'Кабинет')">🏫 Кабинет</div>
                <div class="shop-item" onclick="buyBackground('bg-space', 'Космос')">🚀 Космос</div>
                <div class="shop-item" onclick="buyBackground('bg-cyber', 'Киберпанк')">💀 Киберпанк</div>
            </div>
            <div class="code-log" id="gameLog">
                <div>🤖 Добро пожаловать! Нажимай КОДИТЬ</div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- Игровые данные пользователя ---
    let currentUser = null;
    let coins = 0;
    let currentBg = 'bg-default';
    let ownedBgs = ['bg-default'];
    let combo = 0;
    let isCooldown = false;

    // Кодовые фразы
    const successCodes = [
        { text: 'print("Hello, World!")', msg: 'Приветствие миру! +50' },
        { text: 'def func(): return True', msg: 'Функция работает идеально!' },
        { text: 'import antigravity', msg: 'Антигравитация активирована!' },
        { text: 'list comprehension', msg: 'Генератор списков!' },
        { text: 'with open() as f', msg: 'Файл прочитан' }
    ];
    const failCodes = [
        { text: 'prnt("Hello")', msg: 'NameError: prnt' },
        { text: 'x = 10 / 0', msg: 'ZeroDivisionError' },
        { text: 'import fake', msg: 'ModuleNotFoundError' },
        { text: 'list[999]', msg: 'IndexError' },
        { text: 'while True: pass', msg: 'Бесконечный цикл!' }
    ];

    // Сохранение пользователей в localStorage
    function saveUserData() {
        let users = JSON.parse(localStorage.getItem('codeUsers') || '{}');
        if (currentUser) {
            users[currentUser.login] = {
                password: currentUser.password,
                nickname: currentUser.nickname,
                coins: coins,
                ownedBgs: ownedBgs,
                currentBg: currentBg
            };
            localStorage.setItem('codeUsers', JSON.stringify(users));
            localStorage.setItem('currentUserLogin', currentUser.login);
        }
    }

    function loadUserData(login) {
        let users = JSON.parse(localStorage.getItem('codeUsers') || '{}');
        let data = users[login];
        if (data) {
            coins = data.coins || 0;
            ownedBgs = data.ownedBgs || ['bg-default'];
            currentBg = data.currentBg || 'bg-default';
            document.body.className = currentBg;
            updateCoinDisplay();
            return true;
        }
        coins = 0;
        ownedBgs = ['bg-default'];
        currentBg = 'bg-default';
        document.body.className = currentBg;
        updateCoinDisplay();
        return false;
    }

    function register() {
        let nickname = document.getElementById('regUsername').value.trim();
        let login = document.getElementById('regLogin').value.trim();
        let password = document.getElementById('regPassword').value.trim();
        if (!nickname || !login || !password) {
            alert('Заполните все поля!');
            return;
        }
        let users = JSON.parse(localStorage.getItem('codeUsers') || '{}');
        if (users[login]) {
            alert('Логин уже занят');
            return;
        }
        // Проверка подписки на телеграм (упрощённо)
        let tgConfirmed = confirm("Вы подписались на Telegram канал @hioly3? Нажмите ОК для подтверждения.");
        if (!tgConfirmed) {
            alert("Подпишитесь на канал: https://t.me/hioly3");
            return;
        }
        currentUser = { login, password, nickname };
        users[login] = { password, nickname, coins: 0, ownedBgs: ['bg-default'], currentBg: 'bg-default' };
        localStorage.setItem('codeUsers', JSON.stringify(users));
        localStorage.setItem('currentUserLogin', login);
        loadUserData(login);
        showGame();
    }

    function login() {
        let login = document.getElementById('loginLogin').value.trim();
        let password = document.getElementById('loginPassword').value.trim();
        let users = JSON.parse(localStorage.getItem('codeUsers') || '{}');
        if (!users[login] || users[login].password !== password) {
            alert('Неверный логин или пароль');
            return;
        }
        currentUser = { login, password, nickname: users[login].nickname };
        localStorage.setItem('currentUserLogin', login);
        loadUserData(login);
        showGame();
    }

    function logout() {
        localStorage.removeItem('currentUserLogin');
        currentUser = null;
        document.getElementById('gameScreen').style.display = 'none';
        document.getElementById('authScreen').style.display = 'block';
    }

    function showGame() {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';
        document.getElementById('nicknameDisplay').innerText = currentUser.nickname;
        updateCoinDisplay();
        addLogEntry(true, '', `Добро пожаловать, ${currentUser.nickname}!`);
    }

    function updateCoinDisplay() {
        document.getElementById('coinAmount').innerText = coins;
    }

    function addLogEntry(isSuccess, code, msg) {
        let logDiv = document.getElementById('gameLog');
        let entry = document.createElement('div');
        entry.style.padding = '4px';
        entry.style.borderLeft = `3px solid ${isSuccess ? '#2ecc71' : '#e74c3c'}`;
        entry.style.margin = '4px 0';
        entry.innerHTML = `${isSuccess ? '✅' : '❌'} ${code ? '<code>' + code + '</code> ' : ''}${msg}`;
        logDiv.appendChild(entry);
        entry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        while (logDiv.children.length > 50) logDiv.removeChild(logDiv.firstChild);
    }

    async function doCode() {
        if (isCooldown) return;
        isCooldown = true;
        document.getElementById('gameCharacter').classList.add('typing');
        await new Promise(r => setTimeout(r, 150));
        let successChance = 0.7 + (combo * 0.03);
        successChance = Math.min(successChance, 0.9);
        let isSuccess = Math.random() < successChance;
        let codeItem;
        if (isSuccess) {
            codeItem = successCodes[Math.floor(Math.random() * successCodes.length)];
            coins += 50;
            combo++;
            addLogEntry(true, codeItem.text, `+50 монет! ${codeItem.msg}`);
        } else {
            codeItem = failCodes[Math.floor(Math.random() * failCodes.length)];
            combo = 0;
            addLogEntry(false, codeItem.text, codeItem.msg);
        }
        updateCoinDisplay();
        saveUserData();
        document.getElementById('gameCharacter').classList.remove('typing');
        setTimeout(() => { isCooldown = false; }, 400);
    }

    function toggleShop() {
        let panel = document.getElementById('shopPanel');
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }

    function buyBackground(bgClass, bgName) {
        if (ownedBgs.includes(bgClass)) {
            currentBg = bgClass;
            document.body.className = currentBg;
            saveUserData();
            addLogEntry(true, '', `Фон "${bgName}" применён!`);
        } else if (coins >= 50) {
            coins -= 50;
            ownedBgs.push(bgClass);
            currentBg = bgClass;
            document.body.className = currentBg;
            saveUserData();
            updateCoinDisplay();
            addLogEntry(true, '', `Куплен фон "${bgName}"! -50 монет`);
        } else {
            addLogEntry(false, '', `Не хватает монет для фона "${bgName}"`);
        }
    }

    // Восстановление сессии при загрузке
    let savedLogin = localStorage.getItem('currentUserLogin');
    if (savedLogin) {
        let users = JSON.parse(localStorage.getItem('codeUsers') || '{}');
        if (users[savedLogin]) {
            currentUser = { login: savedLogin, password: users[savedLogin].password, nickname: users[savedLogin].nickname };
            loadUserData(savedLogin);
            showGame();
        } else {
            localStorage.removeItem('currentUserLogin');
        }
    }

    // Горячая клавиша R
    document.addEventListener('keydown', (e) => {
        if (e.code === 'KeyR' && currentUser && !isCooldown) {
            e.preventDefault();
            doCode();
        }
    });
</script>
</body>
</html>
